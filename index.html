<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>房務排班計算器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#f5f6f8; --surface:#fff; --surface2:#f0f1f4; --border:#e2e4ea;
    --accent:#2563eb; --good:#16a34a; --warn:#dc2626;
    --text:#1a1d23; --muted:#6b7280; --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}

  header{background:var(--accent);padding:16px 20px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(37,99,235,.2);}
  header h1{font-size:18px;font-weight:900;color:#fff;}
  header p{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px;font-family:'DM Mono',monospace;}

  .section{padding:16px 16px 0;}
  .section-title{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}

  /* 頂部設定 */
  .top-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
  .top-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;flex-direction:column;gap:4px;}
  .top-card label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .top-card select{background:none;border:none;outline:none;color:var(--accent);font-family:'DM Mono',monospace;font-size:28px;font-weight:700;width:100%;-webkit-appearance:none;appearance:none;cursor:pointer;}
  .summary-bar{background:var(--accent);border-radius:var(--radius);padding:12px 16px;font-family:'DM Mono',monospace;font-size:12px;color:rgba(255,255,255,.8);line-height:2;}
  .summary-bar span{color:#fff;font-weight:700;}
  .summary-bar .big{font-size:18px;}

  /* 模式切換 */
  .mode-row{display:flex;gap:8px;margin-bottom:10px;}
  .mode-btn{flex:1;padding:12px 8px;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;line-height:1.4;}
  .mode-btn .mode-sub{font-size:10px;font-weight:400;display:block;margin-top:3px;opacity:.7;}
  .mode-btn.active{border-color:var(--accent);background:rgba(37,99,235,.06);color:var(--accent);}
  .mode-hint{font-size:12px;color:var(--muted);background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:4px;line-height:1.6;}

  /* 樓層卡片 */
  .floor-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .floor-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);}
  .floor-num{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:var(--accent);min-width:48px;}
  .floor-meta{flex:1;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;line-height:1.7;}
  .floor-total-badge{background:var(--accent);color:#fff;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;border-radius:20px;padding:2px 10px;}
  .remove-btn{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 4px;}

  .floor-inputs{padding:10px 12px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;}
  .floor-inputs.manual-mode{grid-template-columns:1fr 1fr 1fr 1fr 1fr;}
  .inp-group{display:flex;flex-direction:column;gap:4px;}
  .inp-group label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .inp-group.g-floor label{color:var(--accent);}
  .inp-group.g-co    label{color:var(--warn);}
  .inp-group.g-st    label{color:var(--good);}
  .inp-group.g-tgt   label{color:var(--text);}
  .inp-group.g-keep  label{color:#9333ea;}
  .inp-group select{width:100%;border-radius:8px;padding:8px 4px;font-size:16px;font-family:'DM Mono',monospace;font-weight:700;text-align:center;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;border:1px solid var(--border);background:var(--bg);transition:border-color .15s;}
  .inp-group.g-floor select{color:var(--accent);border-color:rgba(37,99,235,.25);}
  .inp-group.g-co    select{color:var(--warn);  border-color:rgba(220,38,38,.25);}
  .inp-group.g-st    select{color:var(--good);  border-color:rgba(22,163,74,.25);}
  .inp-group.g-tgt   select{color:var(--text);  border-color:var(--border);}
  .inp-group.g-keep  select{color:#9333ea;       border-color:rgba(147,51,234,.35);background:rgba(147,51,234,.04);}

  .add-floor-btn{width:calc(100% - 32px);margin:8px 16px 0;padding:12px;background:transparent;border:2px dashed var(--border);border-radius:var(--radius);color:var(--muted);font-family:'Noto Sans TC',sans-serif;font-size:13px;cursor:pointer;}
  .calc-btn{width:calc(100% - 32px);margin:16px 16px 0;padding:16px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-family:'Noto Sans TC',sans-serif;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 4px 12px rgba(37,99,235,.3);}
  .calc-btn:active{opacity:.85;}

  .divider{height:1px;background:var(--border);margin:20px 16px 0;}

  /* 結果共用 */
  .step-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .step-num{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .step-label{font-size:13px;font-weight:700;}
  .step-sub{font-size:11px;color:var(--muted);margin-top:1px;}

  .ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
  .ov-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .ov-value{font-family:'DM Mono',monospace;font-size:26px;color:var(--accent);}
  .ov-label{font-size:10px;color:var(--muted);margin-top:4px;}
  .ov-sub{font-size:11px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace;}

  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;padding:8px 6px;text-align:center;border-bottom:1px solid var(--border);background:var(--surface2);}
  td{padding:8px 6px;text-align:center;font-family:'DM Mono',monospace;border-bottom:1px solid var(--border);}
  tr:last-child td{border-bottom:none;}
  .tc-floor{color:var(--accent);font-weight:700;}
  .tc-co{color:var(--warn);}
  .tc-st{color:var(--good);}
  .tc-keep{color:#9333ea;font-weight:700;}

  .pill{display:inline-block;border-radius:5px;padding:2px 8px;font-size:11px;font-family:'DM Mono',monospace;font-weight:700;}
  .pill.surplus{background:rgba(220,38,38,.08);color:var(--warn);}
  .pill.ok{background:rgba(22,163,74,.08);color:var(--good);}

  /* 調派卡 */
  .dispatch-list{display:flex;flex-direction:column;gap:8px;}
  .dispatch-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .dispatch-card.has-move{border-color:rgba(37,99,235,.3);}
  .dc-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);}
  .dc-floor{font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);min-width:42px;}
  .dc-info{flex:1;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
  .dc-tag{font-size:10px;font-weight:700;border-radius:4px;padding:2px 8px;}
  .dc-tag.move{background:rgba(37,99,235,.1);color:var(--accent);}
  .dc-tag.stay{background:rgba(22,163,74,.08);color:var(--good);}
  .dc-body{padding:10px 14px;display:flex;flex-direction:column;gap:6px;}
  .dc-row{display:flex;align-items:center;gap:8px;}
  .dc-chips{display:flex;gap:4px;flex:1;flex-wrap:wrap;}
  .arrow{color:var(--muted);font-size:14px;flex-shrink:0;}
  .dest-floor{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);}
  .dest-here{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}

  .chip{font-size:12px;font-family:'DM Mono',monospace;font-weight:700;border-radius:5px;padding:3px 8px;}
  .chip.co{background:rgba(220,38,38,.08);color:var(--warn);}
  .chip.st{background:rgba(22,163,74,.08);color:var(--good);}
  .chip.grey{background:var(--surface2);color:var(--muted);font-weight:400;}

  /* 人員卡 */
  .person-list{display:flex;flex-direction:column;gap:8px;}
  .person-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .person-card.ok{border-color:rgba(22,163,74,.4);}
  .person-card.warn{border-color:rgba(220,38,38,.4);}
  .pc-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);}
  .pc-badge{background:var(--accent);color:#fff;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;border-radius:5px;padding:2px 10px;}
  .pc-floors{flex:1;font-size:13px;font-weight:700;font-family:'DM Mono',monospace;}
  .pc-total{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;}
  .pc-body{padding:10px 14px;display:flex;flex-direction:column;gap:6px;}
  .pc-row{display:flex;align-items:center;gap:6px;}
  .pc-floor-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);min-width:30px;}
  .pc-summary{display:flex;gap:8px;margin-top:4px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);flex-wrap:wrap;}

  .warn-box{background:rgba(220,38,38,.05);border:1px solid rgba(220,38,38,.25);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;font-size:13px;color:var(--warn);line-height:1.7;}
  .ok-box{background:rgba(22,163,74,.06);border:1px solid rgba(22,163,74,.25);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;font-size:13px;color:var(--good);}
</style>
</head>
<body>

<header>
  <h1>🏨 房務排班計算器</h1>
  <p>v6 · 自動 ＋ 半手動模式</p>
</header>

<!-- 頂部設定 -->
<div class="section" style="margin-top:14px;">
  <div class="section-title">今日設定</div>
  <div class="top-grid">
    <div class="top-card">
      <label>出勤人數</label>
      <select id="staff-count" onchange="updateSummary()"></select>
    </div>
    <div class="top-card">
      <label>擋房數（只擋退房）</label>
      <select id="block-count" onchange="updateSummary()"></select>
    </div>
  </div>
  <div class="summary-bar" id="summary-bar">請輸入資料</div>
</div>

<!-- 模式切換 -->
<div class="section" style="margin-top:12px;">
  <div class="section-title">分配模式</div>
  <div class="mode-row">
    <button class="mode-btn active" id="btn-auto" onclick="setMode('auto')">
      自動分配
      <span class="mode-sub">系統自動計算退房均分</span>
    </button>
    <button class="mode-btn" id="btn-manual" onclick="setMode('manual')">
      半手動
      <span class="mode-sub">自訂每層樓主留幾間退房</span>
    </button>
  </div>
  <div class="mode-hint" id="mode-hint">
    系統依退房均分目標自動分配，退房塞滿時讓樓主直接吃掉超額，續掃補缺口。
  </div>
</div>

<!-- 各樓資訊 -->
<div class="section" style="margin-top:4px;">
  <div class="section-title">各樓資訊</div>
  <div id="floor-list"></div>
  <button class="add-floor-btn" onclick="addFloor()">＋ 新增樓層</button>
</div>

<button class="calc-btn" onclick="calculate()">計算分配方案</button>

<!-- 結果 -->
<div id="results" style="display:none;">
  <div class="divider"></div>

  <div class="section" style="margin-top:20px;">
    <div class="step-header">
      <div class="step-num">1</div>
      <div><div class="step-label">今日總覽</div><div class="step-sub">退房均分目標計算</div></div>
    </div>
    <div class="ov-grid" id="ov-grid"></div>
  </div>

  <div class="section" style="margin-top:20px;">
    <div class="step-header">
      <div class="step-num">2</div>
      <div><div class="step-label">各樓退房分配</div><div class="step-sub">每層留幾間、撥出幾間</div></div>
    </div>
    <div class="table-wrap"><table id="gap-table"></table></div>
  </div>

  <div class="section" style="margin-top:20px;">
    <div class="step-header">
      <div class="step-num">3</div>
      <div><div class="step-label">各樓調派明細</div><div class="step-sub">撥出去的退房去了哪層</div></div>
    </div>
    <div id="warn-3"></div>
    <div class="dispatch-list" id="dispatch-list"></div>
  </div>

  <div class="section" style="margin-top:20px;">
    <div class="step-header">
      <div class="step-num">4</div>
      <div><div class="step-label">人員分配結果</div><div class="step-sub">每人跑哪幾層、實拿達標狀況</div></div>
    </div>
    <div id="warn-4"></div>
    <div class="person-list" id="person-list"></div>
  </div>
</div>

<script>
// ── 工具 ──────────────────────────────────────
function makeOpts(min, max, sel) {
  let h = '';
  for (let i = min; i <= max; i++)
    h += `<option value="${i}"${i===sel?' selected':''}>${i}</option>`;
  return h;
}
function getVal(id) { return parseInt(document.getElementById(id).value)||0; }

// ── 狀態 ──────────────────────────────────────
let floors = [];
let currentMode = 'auto';

const DEFAULT = [
  {floor:3, co:4, st:6,  tgt:11},
  {floor:4, co:6, st:7,  tgt:12},
  {floor:5, co:2, st:12, tgt:13},
  {floor:6, co:3, st:11, tgt:13},
  {floor:7, co:8, st:6,  tgt:13},
  {floor:8, co:3, st:13, tgt:10},
  {floor:9, co:8, st:9,  tgt:13},
  {floor:10,co:1, st:11, tgt:14},
  {floor:11,co:5, st:14, tgt:13},
  {floor:12,co:8, st:4,  tgt:12},
  {floor:13,co:4, st:11, tgt:12},
  {floor:14,co:2, st:11, tgt:12},
];

// ── 模式切換 ──────────────────────────────────
function setMode(m) {
  currentMode = m;
  document.getElementById('btn-auto').classList.toggle('active', m==='auto');
  document.getElementById('btn-manual').classList.toggle('active', m==='manual');
  document.getElementById('mode-hint').textContent = m==='auto'
    ? '系統依退房均分目標自動分配，退房塞滿時讓樓主直接吃掉超額，續掃補缺口。'
    : '半手動模式：系統先顯示均分建議，你可以在「樓主留房」欄位自訂每層樓主留幾間退房，再按計算。';
  renderFloors();
}

// ── 摘要列 ──────────────────────────────────
function updateSummary() {
  const staff = getVal('staff-count');
  const block = getVal('block-count');
  const totalCo = floors.reduce((s,f)=>s+(f.co||0),0);
  const netCo = Math.max(0, totalCo - block);
  const avgCo = staff>0 ? netCo/staff : 0;
  const lo=Math.floor(avgCo), hi=Math.ceil(avgCo);
  const bar = document.getElementById('summary-bar');
  if(!staff||!totalCo){bar.textContent='請輸入資料';return;}
  bar.innerHTML=`退房 <span>${totalCo}</span> − 擋房 <span>${block}</span> = 有效退房 <span>${netCo}</span> &nbsp;｜&nbsp; 均分目標 <span class="big">${lo===hi?lo:lo+'～'+hi}</span> 間/人`;
}

// ── 樓層卡片 ──────────────────────────────────
function addFloor(d) {
  floors.push({id:Date.now()+Math.random(), ...(d||{floor:1,co:0,st:0,tgt:0,keep:null})});
  renderFloors(); updateSummary();
}
function removeFloor(id) {
  floors=floors.filter(f=>f.id!=id);
  renderFloors(); updateSummary();
}

function renderFloors() {
  const isManual = currentMode==='manual';
  const staff=getVal('staff-count'), block=getVal('block-count');
  const totalCo=floors.reduce((s,f)=>s+(f.co||0),0);
  const netCo=Math.max(0,totalCo-block);
  const avgCoLo=Math.floor(netCo/(staff||1)), avgCoHi=Math.ceil(netCo/(staff||1));

  document.getElementById('floor-list').innerHTML = floors.map((f,idx)=>{
    const total=(f.co||0)+(f.st||0);
    // 半手動模式下，keep 預設為均分建議值
    const suggested = Math.min(f.co||0, idx<((netCo-(avgCoLo*(staff||1)))+(staff||1)) ? avgCoHi : avgCoLo);
    const keepVal = (f.keep!=null) ? f.keep : suggested;
    return `
    <div class="floor-card" id="fc-${f.id}">
      <div class="floor-header">
        <div class="floor-num">${f.floor||'?'}<span style="font-size:13px;font-weight:400;color:var(--muted)">F</span></div>
        <div class="floor-meta">
          <span style="color:var(--warn)">退${f.co||0}</span>
          <span style="margin:0 4px;color:var(--border)">|</span>
          <span style="color:var(--good)">續${f.st||0}</span>
          <span style="margin:0 4px;color:var(--border)">|</span>
          實拿${f.tgt||0}
        </div>
        ${total?`<div class="floor-total-badge">${total}間</div>`:''}
        <button class="remove-btn" onclick="removeFloor('${f.id}')">✕</button>
      </div>
      <div class="floor-inputs${isManual?' manual-mode':''}">
        <div class="inp-group g-floor">
          <label>樓層</label>
          <select onchange="syncFloor('${f.id}','floor',this.value)">${makeOpts(1,30,f.floor||1)}</select>
        </div>
        <div class="inp-group g-co">
          <label>🔴 退房</label>
          <select onchange="syncFloor('${f.id}','co',this.value)">${makeOpts(0,30,f.co||0)}</select>
        </div>
        <div class="inp-group g-st">
          <label>🟢 續掃</label>
          <select onchange="syncFloor('${f.id}','st',this.value)">${makeOpts(0,30,f.st||0)}</select>
        </div>
        <div class="inp-group g-tgt">
          <label>實拿目標</label>
          <select onchange="syncFloor('${f.id}','tgt',this.value)">${makeOpts(0,30,f.tgt||0)}</select>
        </div>
        ${isManual?`
        <div class="inp-group g-keep">
          <label>🟣 樓主留退</label>
          <select class="keep-select" onchange="syncFloor('${f.id}','keep',this.value)">${makeOpts(0,f.co||0,keepVal)}</select>
        </div>`:''}
      </div>
    </div>`;
  }).join('');
}

function syncFloor(id, field, val) {
  const f=floors.find(x=>x.id==id);
  if(!f)return;
  f[field]=parseInt(val)||0;
  // keep 上限不能超過 co，co 改變時同步更新 keep 選單
  if(field==='co') {
    if(f.keep!=null && f.keep>f.co) f.keep=f.co;
    // 重新生成 keep 選單的 options
    const el=document.getElementById('fc-'+id);
    const keepSel=el && el.querySelector('.keep-select');
    if(keepSel) {
      const staff=getVal('staff-count'), block=getVal('block-count');
      const totalCo=floors.reduce((s,x)=>s+(x.co||0),0);
      const netCo=Math.max(0,totalCo-block);
      const avgCoLo=Math.floor(netCo/(staff||1)), avgCoHi=Math.ceil(netCo/(staff||1));
      const idx=floors.findIndex(x=>x.id==id);
      const hiCount=netCo-(avgCoLo*(staff||1));
      const suggested=Math.min(f.co||0, idx<hiCount ? avgCoHi : avgCoLo);
      const keepVal=(f.keep!=null)?Math.min(f.keep,f.co||0):suggested;
      keepSel.innerHTML=makeOpts(0,f.co||0,keepVal);
      f.keep=keepVal;
    }
  }
  const el=document.getElementById('fc-'+id);
  const total=(f.co||0)+(f.st||0);
  el.querySelector('.floor-num').innerHTML=`${f.floor||'?'}<span style="font-size:13px;font-weight:400;color:var(--muted)">F</span>`;
  el.querySelector('.floor-meta').innerHTML=
    `<span style="color:var(--warn)">退${f.co||0}</span>`+
    `<span style="margin:0 4px;color:var(--border)">|</span>`+
    `<span style="color:var(--good)">續${f.st||0}</span>`+
    `<span style="margin:0 4px;color:var(--border)">|</span>實拿${f.tgt||0}`;
  const badge=el.querySelector('.floor-total-badge');
  if(badge) badge.textContent=total?total+'間':'';
  updateSummary();
}

// ═══════════════════════════════════════════════
//  核心分配邏輯
// ═══════════════════════════════════════════════
function calculate() {
  const raw=floors.map(f=>({
    floor:f.floor||0, co:f.co||0, st:f.st||0, tgt:f.tgt||0,
    total:(f.co||0)+(f.st||0), keepOverride:f.keep,
  })).filter(d=>d.floor&&d.tgt).sort((a,b)=>a.floor-b.floor);

  if(!raw.length){alert('請至少輸入 1 個有效樓層');return;}
  const staff=getVal('staff-count');
  if(!staff){alert('請輸入今日人數');return;}
  const block=getVal('block-count');

  const totalCo=raw.reduce((s,d)=>s+d.co,0);
  const totalSt=raw.reduce((s,d)=>s+d.st,0);
  const netCo=Math.max(0,totalCo-block);
  const avgCo=netCo/staff;
  const avgCoLo=Math.floor(avgCo), avgCoHi=Math.ceil(avgCo);
  const hiCount=netCo-avgCoLo*staff;

  // ── 決定每層樓主留的退房數和續掃數 ────────────
  const floorState=raw.map((d,idx)=>{
    // 退房：半手動用自訂值，自動用均分目標
    let keepCo;
    if(currentMode==='manual' && d.keepOverride!=null) {
      keepCo=Math.min(d.keepOverride, d.co);
    } else {
      const coTarget=idx<hiCount ? avgCoHi : avgCoLo;
      keepCo=Math.min(d.co, coTarget);
    }
    const giveCo=d.co-keepCo;
    // 續掃：樓主最多留 tgt-keepCo 間，多的撥出
    const keepSt=Math.min(d.st, Math.max(0, d.tgt-keepCo));
    const giveSt=d.st-keepSt;
    const deficit=d.tgt-keepCo-keepSt;
    return {...d, keepCo, giveCo, keepSt, giveSt, deficit, personId:idx+1};
  });

  // ── 配對：有缺口的人補退房或續掃 ──────────────
  const givePoolCo=floorState.filter(f=>f.giveCo>0)
    .map(f=>({fromFloor:f.floor, avail:f.giveCo}));
  const givePoolSt={};
  floorState.forEach(f=>{ givePoolSt[f.floor]=f.giveSt; });

  const needPool=floorState.filter(f=>f.deficit>0)
    .map(f=>({floor:f.floor, need:f.deficit}))
    .sort((a,b)=>b.need-a.need);

  const crossings={};
  const floorVisitors={};
  raw.forEach(d=>floorVisitors[d.floor]=0);

  for(const nd of needPool){
    let remaining=nd.need;
    const f=floorState.find(f=>f.floor===nd.floor);
    const pid=f.personId;
    if(!crossings[pid]) crossings[pid]=[];

    // 判斷這個人的退房是否已達均分目標
    const coTarget=floorState.indexOf(f)<hiCount ? avgCoHi : avgCoLo;
    const coNeeded=Math.max(0, coTarget - f.keepCo); // 還差幾間退房才到均分目標

    // 第一輪：退房還不夠均分目標 → 優先補退房
    if(coNeeded>0){
      for(const gv of givePoolCo){
        if(remaining<=0) break;
        if(gv.avail<=0) continue;
        if(floorVisitors[gv.fromFloor]>=1) continue;
        const take=Math.min(remaining, coNeeded, gv.avail);
        const ex=crossings[pid].find(c=>c.toFloor===gv.fromFloor);
        if(ex){ex.co+=take;}
        else{crossings[pid].push({toFloor:gv.fromFloor,co:take,st:0});floorVisitors[gv.fromFloor]++;}
        gv.avail-=take;
        remaining-=take;
      }
    }
    // 退房已達標 → 直接跳過，不再拿退房

    // 第二輪：補續掃（無人數限制）
    if(remaining>0){
      const stAvail=Object.entries(givePoolSt)
        .filter(([fl,av])=>parseInt(fl)!==nd.floor && av>0)
        .map(([fl,av])=>({floor:parseInt(fl), avail:av}))
        .sort((a,b)=>b.avail-a.avail);
      for(const ss of stAvail){
        if(remaining<=0) break;
        const take=Math.min(remaining, ss.avail);
        const ex=crossings[pid].find(c=>c.toFloor===ss.floor);
        if(ex){ex.st+=take;}
        else{crossings[pid].push({toFloor:ss.floor,co:0,st:take});}
        givePoolSt[ss.floor]-=take;
        remaining-=take;
      }
    }
  }

  // ── 計算每人最終 ─────────────────────────────
  const persons=floorState.map(f=>{
    const cross=crossings[f.personId]||[];
    const crossCo=cross.reduce((s,c)=>s+c.co,0);
    const crossSt=cross.reduce((s,c)=>s+c.st,0);
    const rooms=[{floor:f.floor, co:f.keepCo, st:f.keepSt, total:f.keepCo+f.keepSt}];
    cross.forEach(c=>rooms.push({floor:c.toFloor,co:c.co,st:c.st,total:c.co+c.st}));
    const totalCoP=f.keepCo+crossCo, totalStP=f.keepSt+crossSt;
    return {
      personId:f.personId, mainFloor:f.floor, target:f.tgt,
      rooms, floorList:[f.floor,...cross.map(c=>c.toFloor)].sort((a,b)=>a-b),
      totalCo:totalCoP, totalSt:totalStP, totalRooms:totalCoP+totalStP,
      ok:(totalCoP+totalStP)===f.tgt,
    };
  });

  // ── 調派視角（每層撥出去的去哪） ────────────
  const floorOutMap={};
  raw.forEach(d=>floorOutMap[d.floor]=[]);
  persons.forEach(p=>{
    p.rooms.slice(1).forEach(r=>{
      floorOutMap[r.floor].push({fromMainFloor:p.mainFloor,co:r.co,st:r.st});
    });
  });

  // ══════════════════════════════════════════════
  //  渲染
  // ══════════════════════════════════════════════
  document.getElementById('results').style.display='block';
  setTimeout(()=>document.getElementById('results').scrollIntoView({behavior:'smooth'}),100);

  // STEP 1
  document.getElementById('ov-grid').innerHTML=`
    <div class="ov-card"><div class="ov-value">${totalCo}</div><div class="ov-label">今日退房總數</div><div class="ov-sub">擋房${block}，有效${netCo}</div></div>
    <div class="ov-card"><div class="ov-value">${staff}</div><div class="ov-label">今日人力</div></div>
    <div class="ov-card"><div class="ov-value">${avgCoLo===avgCoHi?avgCoLo:avgCoLo+'～'+avgCoHi}</div><div class="ov-label">退房均分目標/人</div><div class="ov-sub">${netCo}÷${staff}=${avgCo.toFixed(2)}</div></div>
    <div class="ov-card"><div class="ov-value">${totalSt}</div><div class="ov-label">今日續掃總數</div><div class="ov-sub">不參與均分</div></div>`;

  // STEP 2
  const modeNote = currentMode==='manual'
    ? '<th>🟣留退</th><th>撥出退</th><th>留續</th><th>撥出續</th>'
    : '<th>均分目標</th><th>留退</th><th>撥出退</th><th>留續</th><th>撥出續</th>';
  document.getElementById('gap-table').innerHTML=`
    <thead><tr><th>樓</th><th>退房</th>${modeNote}<th>實拿目標</th><th>缺口</th></tr></thead>
    <tbody>${floorState.map(f=>{
      const defLabel=f.deficit>0?`<span class="pill surplus">缺${f.deficit}</span>`:
                     f.deficit<0?`<span class="pill ok">足夠</span>`:`<span class="pill ok">剛好</span>`;
      const midCols=currentMode==='manual'
        ?`<td class="tc-keep">${f.keepCo}</td><td class="tc-co">${f.giveCo>0?f.giveCo:'－'}</td><td class="tc-st">${f.keepSt}</td><td class="tc-st">${f.giveSt>0?f.giveSt:'－'}</td>`
        :`<td>${avgCoLo===avgCoHi?avgCoLo:avgCoLo+'～'+avgCoHi}</td><td class="tc-keep">${f.keepCo}</td><td class="tc-co">${f.giveCo>0?f.giveCo:'－'}</td><td class="tc-st">${f.keepSt}</td><td class="tc-st">${f.giveSt>0?f.giveSt:'－'}</td>`;
      return`<tr><td class="tc-floor">${f.floor}F</td><td class="tc-co">${f.co}</td>${midCols}<td>${f.tgt}</td><td>${defLabel}</td></tr>`;
    }).join('')}</tbody>`;

  // STEP 3
  document.getElementById('warn-3').innerHTML='';
  document.getElementById('dispatch-list').innerHTML=floorState.map(f=>{
    const outs=floorOutMap[f.floor];
    const hasMove=outs.length>0;
    const outRows=outs.map(o=>`
      <div class="dc-row">
        <div class="dc-chips">
          ${o.co>0?`<span class="chip co">退 ${o.co}</span>`:''}
          ${o.st>0?`<span class="chip st">續 ${o.st}</span>`:''}
        </div>
        <div class="arrow">→</div>
        <span class="dest-floor">${o.fromMainFloor}F 樓主帶走</span>
      </div>`).join('');
    const stayRow=(f.keepCo>0||f.keepSt>0)?`
      <div class="dc-row">
        <div class="dc-chips">
          ${f.keepCo>0?`<span class="chip co">退 ${f.keepCo}</span>`:''}
          ${f.keepSt>0?`<span class="chip st">續 ${f.keepSt}</span>`:''}
        </div>
        <div class="arrow">→</div>
        <span class="dest-here">留本層</span>
      </div>`:'';
    return`
    <div class="dispatch-card${hasMove?' has-move':''}">
      <div class="dc-header">
        <span class="dc-floor">${f.floor}F</span>
        <span class="dc-info">共${f.total}間｜退${f.co} 續${f.st}｜實拿${f.tgt}</span>
        <span class="dc-tag ${hasMove?'move':'stay'}">${hasMove?'需撥出':'不用調整'}</span>
      </div>
      ${hasMove?`<div class="dc-body">${outRows}${stayRow}</div>`:''}
    </div>`;
  }).join('');

  // STEP 4
  const coArr=persons.map(p=>p.totalCo);
  const maxCo=Math.max(...coArr), minCo=Math.min(...coArr);
  let warn4='';
  const over=persons.filter(p=>p.totalRooms>p.target);
  const under=persons.filter(p=>p.totalRooms<p.target);
  if(over.length){
    warn4+=`<div class="warn-box">⚠️ 以下樓主實拿超過目標（續掃補太多）：<br>${over.map(p=>`${p.mainFloor}F樓主：實拿${p.totalRooms}間，目標${p.target}間，多${p.totalRooms-p.target}間`).join('<br>')}</div>`;
  }
  if(under.length){
    warn4+=`<div class="warn-box">⚠️ 以下樓主實拿不足目標：<br>${under.map(p=>`${p.mainFloor}F樓主：實拿${p.totalRooms}間，目標${p.target}間，缺${p.target-p.totalRooms}間`).join('<br>')}</div>`;
  }
  if(maxCo-minCo>2){
    warn4+=`<div class="warn-box">⚠️ 退房差距${maxCo-minCo}間（最多${maxCo}、最少${minCo}）</div>`;
  }
  if(!warn4) warn4=`<div class="ok-box">✓ 所有樓主實拿達標</div>`;
  document.getElementById('warn-4').innerHTML=warn4;

  document.getElementById('person-list').innerHTML=persons.map(p=>{
    const coColor=p.totalCo<avgCoLo?'var(--warn)':p.totalCo>avgCoHi?'var(--accent)':'var(--good)';
    return`
    <div class="person-card ${p.ok?'ok':'warn'}">
      <div class="pc-header">
        <span class="pc-badge">${p.mainFloor}F主</span>
        <span class="pc-floors">${p.floorList.map(f=>f+'F').join(' ＋ ')}</span>
        <span class="pc-total" style="color:${p.ok?'var(--good)':'var(--warn)'}">${p.totalRooms}間</span>
      </div>
      <div class="pc-body">
        ${p.rooms.map(r=>`
        <div class="pc-row">
          <span class="pc-floor-label">${r.floor}F</span>
          ${r.co>0?`<span class="chip co">退 ${r.co}</span>`:''}
          ${r.st>0?`<span class="chip st">續 ${r.st}</span>`:''}
          <span class="chip grey">${r.total}間</span>
        </div>`).join('')}
        <div class="pc-summary">
          <span>退房 <span style="color:${coColor};font-weight:700">${p.totalCo}</span></span>
          <span>續掃 <span style="color:var(--text)">${p.totalSt}</span></span>
          <span>合計 <span style="color:${p.ok?'var(--good)':'var(--warn)'};font-weight:700">${p.totalRooms}／${p.target} ${p.ok?'✓':'✗'}</span></span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── 初始化 ──────────────────────────────────
document.getElementById('staff-count').innerHTML=makeOpts(1,30,12);
document.getElementById('block-count').innerHTML=makeOpts(0,30,0);
DEFAULT.forEach(d=>floors.push({id:Date.now()+Math.random(),...d,keep:null}));
renderFloors();
updateSummary();
</script>
</body>
